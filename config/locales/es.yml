es:
  hello: "Hola mundo"
  
  # ActiveRecord translations from rails-i18n
  date:
    formats:
      default: "%d/%m/%Y"
      short: "%d de %b"
      long: "%d de %B de %Y"

    day_names:
      - domingo
      - lunes
      - martes
      - miércoles
      - jueves
      - viernes
      - sábado
    abbr_day_names:
      - dom
      - lun
      - mar
      - mié
      - jue
      - vie
      - sáb

    month_names:
      - ~
      - enero
      - febrero
      - marzo
      - abril
      - mayo
      - junio
      - julio
      - agosto
      - septiembre
      - octubre
      - noviembre
      - diciembre
    abbr_month_names:
      - ~
      - ene
      - feb
      - mar
      - abr
      - may
      - jun
      - jul
      - ago
      - sep
      - oct
      - nov
      - dic
    order:
      - :day
      - :month
      - :year

  time:
    formats:
      default: "%A, %d de %B de %Y %H:%M:%S %z"
      short: "%d de %b %H:%M"
      long: "%d de %B de %Y %H:%M"
    am: "am"
    pm: "pm"

  support:
    array:
      words_connector: ", "
      two_words_connector: " y "
      last_word_connector: " y "

    select:
      prompt: "Por favor seleccione"

  number:
    format:
      separator: ","
      delimiter: "."
      precision: 3
      significant: false
      strip_insignificant_zeros: false

    currency:
      format:
        format: "%n %u"
        unit: "$"
        separator: ","
        delimiter: "."
        precision: 2
        significant: false
        strip_insignificant_zeros: false

    percentage:
      format:
        delimiter: "."
        format: "%n%"

    precision:
      format:
        delimiter: "."

    human:
      format:
        delimiter: "."
        precision: 1
        significant: false
        strip_insignificant_zeros: false
      storage_units:
        format: "%n %u"
        units:
          byte:
            one: "Byte"
            other: "Bytes"
          kb: "KB"
          mb: "MB"
          gb: "GB"
          tb: "TB"

  datetime:
    distance_in_words:
      half_a_minute: "medio minuto"
      less_than_x_seconds:
        one: "menos de 1 segundo"
        other: "menos de %{count} segundos"
      x_seconds:
        one: "1 segundo"
        other: "%{count} segundos"
      less_than_x_minutes:
        one: "menos de 1 minuto"
        other: "menos de %{count} minutos"
      x_minutes:
        one: "1 minuto"
        other: "%{count} minutos"
      about_x_hours:
        one: "alrededor de 1 hora"
        other: "alrededor de %{count} horas"
      x_days:
        one: "1 día"
        other: "%{count} días"
      about_x_months:
        one: "alrededor de 1 mes"
        other: "alrededor de %{count} meses"
      x_months:
        one: "1 mes"
        other: "%{count} meses"
      about_x_years:
        one: "alrededor de 1 año"
        other: "alrededor de %{count} años"
      over_x_years:
        one: "más de 1 año"
        other: "más de %{count} años"
      almost_x_years:
        one: "casi 1 año"
        other: "casi %{count} años"

    prompts:
      year: "Año"
      month: "Mes"
      day: "Día"
      hour: "Hora"
      minute: "Minutos"
      second: "Segundos"

  helpers:
    select:
      prompt: "Por favor seleccione"

    submit:
      create: "Crear %{model}"
      submit: "Guardar %{model}"
      update: "Actualizar %{model}"

  errors:
    format: "%{attribute} %{message}"

    messages:
      accepted: "debe ser aceptado"
      blank: "no puede estar en blanco"
      present: "debe estar en blanco"
      confirmation: "no coincide"
      empty: "no puede estar vacío"
      equal_to: "debe ser igual a %{count}"
      even: "debe ser par"
      exclusion: "está reservado"
      greater_than: "debe ser mayor que %{count}"
      greater_than_or_equal_to: "debe ser mayor que o igual a %{count}"
      inclusion: "no está incluido en la lista"
      invalid: "no es válido"
      less_than: "debe ser menor que %{count}"
      less_than_or_equal_to: "debe ser menor que o igual a %{count}"
      model_invalid: "La validación falló: %{errors}"
      not_a_number: "no es un número"
      not_an_integer: "debe ser un entero"
      odd: "debe ser impar"
      required: "debe existir"
      taken: "ya está en uso"
      too_long:
        one: "es demasiado largo (1 carácter máximo)"
        other: "es demasiado largo (%{count} caracteres máximo)"
      too_short:
        one: "es demasiado corto (1 carácter mínimo)"
        other: "es demasiado corto (%{count} caracteres mínimo)"
      wrong_length:
        one: "no tiene la longitud correcta (1 carácter exactos)"
        other: "no tiene la longitud correcta (%{count} caracteres exactos)"
      other_than: "debe ser distinto de %{count}"

  activerecord:
    errors:
      messages:
        record_invalid: "La validación falló: %{errors}"
        restrict_dependent_destroy:
          has_one: "No se puede eliminar el registro porque existe un %{record} dependiente"
          has_many: "No se puede eliminar el registro porque existen %{record} dependientes"

    models:
      car: "Auto"
      brand: "Marca"

    attributes:
      car:
        model: "Modelo"
        year: "Año"
        transmission: "Transmisión"
        condition: "Condición"
        mileage: "Kilómetros"
        color: "Color"
        price: "Precio"
        brand: "Marca"
        brand_id: "Marca"
        image: "Imagen"
        created_at: "Creado el"
        updated_at: "Actualizado el"

      brand:
        name: "Nombre"
        created_at: "Creado el"
        updated_at: "Actualizado el"

  # Traducciones relacionadas con autos
  cars:
    title: "Todos los Autos"
    new_car: "Nuevo Auto"
    edit_car: "Editar Auto"
    show_car: "Detalles del Auto"
    delete_car: "Eliminar Auto"
    created_successfully: "¡Auto creado exitosamente!"
    updated_successfully: "¡Auto actualizado exitosamente!"
    deleted_successfully: "Auto eliminado exitosamente."
    creation_error: "Error al crear el auto. Revisa los campos."
    update_error: "Error al actualizar el auto. Revisa los campos."
    
  # Atributos del auto
  car:
    model: "Modelo"
    year: "Año"
    transmission: "Transmisión"
    condition: "Condición"
    mileage: "Kilómetros"
    color: "Color"
    price: "Precio"
    brand: "Marca"
    image: "Subir imagen"
    
  # Opciones de transmisión
  transmission:
    all: "Todas"
    manual: "Manual"
    automatic: "Automática"
    
  # Opciones de condición
  condition:
    all: "Todas"
    brand_new: "Nuevo"
    used: "Usado"
    certified: "Certificado"
    
  # Filtros
  filters:
    title: "Filtrar autos"
    search: "Buscar por modelo..."
    brand: "Marca"
    transmission: "Transmisión"
    condition: "Condición"
    color: "Color"
    year_range: "Rango de Años"
    price_range: "Rango de Precios"
    mileage_range: "Rango de Kilómetros"
    min_year: "Año Mínimo"
    max_year: "Año Máximo"
    min_price: "Precio Mínimo"
    max_price: "Precio Máximo"
    min_mileage: "Kilómetros Mínimos"
    max_mileage: "Kilómetros Máximos"
    
  # Elementos de UI
  ui:
    save: "Guardar"
    cancel: "Cancelar"
    close: "Cerrar"
    select_brand: "Seleccionar marca"
    results_count: 
      zero: "No se encontraron autos"
      one: "%{count} auto encontrado"
      other: "%{count} autos encontrados"
    
  auth:
    login_required: "Debes iniciar sesión para continuar."
